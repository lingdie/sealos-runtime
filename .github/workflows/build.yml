name: build kubernetes containerd runtime

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build.yml"
      - ".github/versions/supported-minors.txt"
      - "Kubefile"
      - "cmd/**"
      - "go.mod"
      - "go.sum"
      - "rootfs/**"
      - "scripts/**"
      - "README.md"
  workflow_dispatch:
    inputs:
      kubernetes_version:
        description: "Kubernetes version to build, e.g. v1.36.1. Leave empty to build latest patch for all supported minors."
        required: false
        default: ""
      arch:
        description: "Architecture to build: all, amd64, or arm64"
        required: true
        default: all
      image:
        description: "Image repository, e.g. ghcr.io/owner/repo/kubernetes"
        required: false
        default: ""
      push:
        description: "Push images"
        type: boolean
        required: true
        default: false
      all_images:
        description: "Save all variants from manifest lists"
        type: boolean
        required: true
        default: false

env:
  DEFAULT_IMAGE: ghcr.io/${{ github.repository }}/kubernetes
  INPUT_KUBERNETES_VERSION: ${{ github.event.inputs.kubernetes_version || '' }}
  INPUT_ARCH: ${{ github.event.inputs.arch || 'all' }}
  INPUT_IMAGE: ${{ github.event.inputs.image || '' }}
  INPUT_PUSH: ${{ github.event.inputs.push || 'false' }}
  INPUT_ALL_IMAGES: ${{ github.event.inputs.all_images || 'false' }}

jobs:
  resolve:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      versions: ${{ steps.versions.outputs.versions }}
      image: ${{ steps.image.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Validate layout
        shell: bash
        run: scripts/validate-layout.sh

      - id: image
        shell: bash
        run: |
          image="$INPUT_IMAGE"
          if [ -z "$image" ]; then
            image="${DEFAULT_IMAGE,,}"
          fi
          echo "image=$image" >>"$GITHUB_OUTPUT"

      - id: matrix
        shell: bash
        run: |
          arches="$INPUT_ARCH"
          if [ -z "$arches" ] || [ "$arches" = all ]; then
            arches=amd64,arm64
          fi
          args=(--matrix --arches "$arches")
          if [ -n "$INPUT_KUBERNETES_VERSION" ]; then
            args+=(--kubernetes-version "$INPUT_KUBERNETES_VERSION")
          fi
          matrix="$(scripts/resolve-versions.sh "${args[@]}")"
          echo "$matrix"
          echo "matrix=$matrix" >>"$GITHUB_OUTPUT"

      - id: versions
        shell: bash
        run: |
          args=(--versions-only)
          if [ -n "$INPUT_KUBERNETES_VERSION" ]; then
            args+=(--kubernetes-version "$INPUT_KUBERNETES_VERSION")
          fi
          versions="$(scripts/resolve-versions.sh "${args[@]}" | paste -sd, -)"
          printf 'versions=%s\n' "$versions" >>"$GITHUB_OUTPUT"

  build:
    needs: resolve
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install host tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y conntrack lsof buildah

      - name: Install sealos
        shell: bash
        run: |
          case "$(uname -m)" in
            x86_64) arch=amd64 ;;
            aarch64) arch=arm64 ;;
            *) echo "unsupported runner arch: $(uname -m)" >&2; exit 1 ;;
          esac
          tag="$(curl -fsSL https://api.github.com/repos/labring/sealos/releases/latest | sed -n 's/.*"tag_name": *"\([^"]*\)".*/\1/p' | head -n 1)"
          version="${tag#v}"
          curl -fL --retry 5 -o /tmp/sealos.tgz "https://github.com/labring/sealos/releases/download/${tag}/sealos_${version}_linux_${arch}.tar.gz"
          sudo tar -xzf /tmp/sealos.tgz -C /usr/local/bin sealos
          sudo chmod 0755 /usr/local/bin/sealos
          sealos version

      - name: Login
        if: ${{ env.INPUT_PUSH == 'true' }}
        shell: bash
        run: |
          sudo sealos login -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}" ghcr.io

      - name: Build
        shell: bash
        run: |
          image="${{ needs.resolve.outputs.image }}:${{ matrix.kubernetes }}-${{ matrix.arch }}"
          args=(
            --kubernetes-version "${{ matrix.kubernetes }}"
            --arch "${{ matrix.arch }}"
            --image "$image"
            --sealos-version latest
          )
          if [ "$INPUT_PUSH" = "true" ]; then
            args+=(--push)
          fi
          if [ "$INPUT_ALL_IMAGES" = "true" ]; then
            args+=(--all)
          fi
          sudo -E scripts/build-rootfs.sh "${args[@]}"

  manifest:
    needs:
      - resolve
      - build
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.push == true && inputs.arch == 'all' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install buildah
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y buildah

      - name: Login
        shell: bash
        run: |
          buildah login -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}" ghcr.io

      - name: Push manifests
        shell: bash
        run: |
          IFS=',' read -r -a versions <<<"${{ needs.resolve.outputs.versions }}"
          for version in "${versions[@]}"; do
            [ -n "$version" ] || continue
            target="${{ needs.resolve.outputs.image }}:${version}"
            scripts/create-manifest.sh \
              --target "$target" \
              --image "${{ needs.resolve.outputs.image }}:${version}-amd64" \
              --image "${{ needs.resolve.outputs.image }}:${version}-arm64" \
              --push
          done
